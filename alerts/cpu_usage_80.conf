template: cpu_usage_above_80
on      : system.cpu
class   : Utilization
type    : System
component: CPU
host labels: _os=linux

lookup  : average -5m unaligned of user,system,softirq,irq,guest
units   : %
every   : 1m

warn    : $this > (($status >= $WARNING) ? (60) : (80))
crit    : $this > (($status == $CRITICAL) ? (80) : (95))

delay   : down 15m multiplier 1.5 max 1h

summary : System CPU utilization
info    : Average CPU utilization over the last 10 minutes
to      : sysadmin
