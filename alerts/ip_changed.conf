alarm: IP_address_changed
on: ip_change.ip 
lookup: last -5m
every: 5m
warn: $this == 1
info: 'Public IP of the server has changed. New IP: `cat /var/log/my_public_ip.log | tail -n1`'

# ALERT structure:
# alarm: <alert_id>
# on: <chart_id>
# lookup: <method> <duration>
# every: <frequency>
# warn: <condition>
# crit: <condition>   (optional)
# info: <description>
#
# Explanation:
# - alarm: unique alert name
# - on: chart this alert is attached to
# - lookup: how Netdata evaluates recent data (last, average, min, max)
# - every: how often the alert is checked
# - warn/crit: conditions using $this (current metric value)
# - info: message shown in notifications
